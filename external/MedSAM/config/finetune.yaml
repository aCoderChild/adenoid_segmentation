# Path to training data (should contain 'imgs' and 'gts' subfolders)
train_data_path: data/segmentation/train_data

# Model and checkpoint
model_type: vit_b
checkpoint: external/MedSAM/work_dir/MedSAM/medsam_vit_b.pth

# Output directory for best checkpoint
work_dir: external/MedSAM/work_dir/MedSAM

# Training hyperparameters
num_epochs: 5
batch_size: 2
num_workers: 4
lr: 0.0001
weight_decay: 0.01

# LoRA settings
use_lora: true
lora_r: 8
lora_alpha: 16
lora_dropout: 0.1

# Device
device: mps
